services:
  postgres:
    image: postgres:16-alpine
    container_name: code-review-postgres-dev
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    container_name: code-review-api-dev
    env_file:
      - ./api/.env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "8000:8000"
    volumes:
      - ./api:/workspace/api
      - ./db:/workspace/db
      - api_venv:/workspace/.venv
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile.dev
    container_name: code-review-worker-dev
    env_file:
      - ./worker/.env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./worker:/workspace/worker
      - ./db:/workspace/db
      - worker_venv:/workspace/.venv
      - clone_data_dev:/tmp/repos
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: code-review-frontend-dev
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres_data_dev:
  api_venv:
  worker_venv:
  clone_data_dev:
  frontend_node_modules:
